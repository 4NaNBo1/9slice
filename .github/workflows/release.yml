name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build with tag version
        run: npm run build
        env:
          VERSION: ${{ github.ref_name }}

      - name: Verify package manifest entries
        run: |
          node -e "const fs=require('fs'); for (const file of ['manifest.json','manifest.mastergo.json']) { const manifest=JSON.parse(fs.readFileSync('dist/'+file, 'utf8')); for (const entry of [manifest.main, manifest.ui]) { const path='dist/'+entry.replace(/^\\.\\//, ''); if (!fs.existsSync(path)) throw new Error(file+' references missing '+entry); } }"

      - name: Package
        run: cd dist && zip -r ../nine-slice-scaling-${{ github.ref_name }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: nine-slice-scaling-${{ github.ref_name }}.zip
          generate_release_notes: true
